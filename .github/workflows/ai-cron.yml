name: AI Article Generator

on:
  schedule:
    # 06:00 BRT (09:00 UTC)
    - cron: '0 9 * * *'
    # 12:00 BRT (15:00 UTC)
    - cron: '0 15 * * *'
    # 17:00 BRT (20:00 UTC)
    - cron: '0 20 * * *'
    # 22:30 BRT (01:30 UTC)
    - cron: '30 1 * * *'
  # Permite rodar manualmente pelo painel do GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate AI Article
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Rodamos diretamente com tsx já que não teremos o arquivo .env no github
        run: npx tsx scripts/generate-article.ts

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Verifica se existem novos arquivos gerados (imagens, md, ou history.json modificado)
          if [[ -n "$(git status --porcelain)" ]]; then
            git add content/articles/ public/images/ data/history.json
            git commit -m "🤖 Auto-generated AI article [skip ci]"
            git push
            echo "✅ Artigo commitado com sucesso."
          else
            echo "⚠️ Nenhuma notícia nova. Nada a commitar."
          fi
